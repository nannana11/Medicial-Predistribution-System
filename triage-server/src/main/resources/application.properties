# ============================================================
#  医院分诊系统 - 中央主机配置文件
#  修改配置后重启服务生效。系统属性优先级高于本文件。
#  例如：java -Dtriage.server.port=9090 -jar triage-system.jar
# ============================================================

# ---- 服务器配置 ----
# Netty 服务端监听端口
triage.server.port=8080

# Netty 工作线程数（0 表示使用默认值：CPU核心数×2）
triage.netty.worker.threads=0

# 第一阶段默认使用本地模拟分诊，不需要联网或 API Key。
# 接入 DeepSeek 时改为 false，并设置 DEEPSEEK_API_KEY 环境变量。
triage.ai.mock=false

# ---- AI 服务配置 ----
# DeepSeek API Key
# 【重要】使用真实 API 时，在此处填写你的 API Key
# 或通过启动参数传入：-Dtriage.deepseek.api.key=sk-your-key-here
#triage.deepseek.api.key=你猜

# DeepSeek API 接口地址
triage.deepseek.api.url=https://api.deepseek.com/v1/chat/completions

# DeepSeek 模型名称
triage.deepseek.model=deepseek-chat

# AI 请求超时时间（毫秒）
triage.ai.timeout.ms=30000
